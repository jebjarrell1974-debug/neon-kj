packages:
  "framer-motion": "Smooth animations for queue changes and page transitions"
  "usehooks-ts": "React hooks for debounce and local storage management"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility function to efficiently merge Tailwind CSS classes"

images:
