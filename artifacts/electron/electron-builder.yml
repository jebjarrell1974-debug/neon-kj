appId: com.neonkj.app
  productName: NEON KJ
  copyright: NEON KJ

  directories:
    output: release
    buildResources: build

  files:
    - dist/main.js
    - dist/preload.js
    - server.cjs
    - renderer/**
    - "!renderer/**/*.map"

  asarUnpack:
    - "node_modules/@libsql/**"

  linux:
    target:
      - target: dir
        arch:
          - arm64
    category: Audio
    executableName: neon-kj
  