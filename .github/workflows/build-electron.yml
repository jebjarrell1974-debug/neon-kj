name: Build NEON KJ Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-pi:
    name: Build Raspberry Pi 5 AppImage (ARM64)
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libfuse2

      - name: Install all workspace dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Build React frontend (renderer)
        working-directory: artifacts/neon-kj
        env:
          PORT: "3001"
          BASE_PATH: "/"
          NODE_ENV: production
        run: pnpm run build

      - name: Build API server
        working-directory: artifacts/api-server
        run: pnpm run build

      - name: Copy server bundle into electron package
        run: cp artifacts/api-server/dist/electron-entry.cjs artifacts/electron/server.cjs

      - name: Copy renderer into electron package
        run: cp -r artifacts/neon-kj/dist/public artifacts/electron/renderer

      - name: Compile Electron TypeScript
        working-directory: artifacts/electron
        run: pnpm exec tsc

      - name: Copy libsql ARM64 native module
        working-directory: artifacts/electron
        run: |
          mkdir -p node_modules/@libsql
          cp -r ../../node_modules/@libsql/client node_modules/@libsql/client 2>/dev/null || true
          cp -r ../../node_modules/@libsql/linux-arm64-gnu node_modules/@libsql/linux-arm64-gnu 2>/dev/null || true

      - name: Fix app-builder-bin binary for ARM64
        working-directory: artifacts/electron
        run: |
          AB_ARM64="node_modules/app-builder-bin/linux/arm64/app-builder"
          AB_X64="node_modules/app-builder-bin/linux/x64/app-builder"
          echo "Runner arch: $(uname -m)"
          ls -la node_modules/app-builder-bin/linux/ || echo "No linux dir found"
          if [ -f "$AB_ARM64" ]; then
            mkdir -p node_modules/app-builder-bin/linux/x64
            cp "$AB_ARM64" "$AB_X64"
            chmod +x "$AB_X64"
            echo "Copied arm64 app-builder to x64 path"
          else
            echo "WARNING: arm64 app-builder binary not found at $AB_ARM64"
            find node_modules/app-builder-bin -name "app-builder" 2>/dev/null || echo "No app-builder binaries found at all"
          fi

      - name: Build Raspberry Pi AppImage
        working-directory: artifacts/electron
        run: pnpm exec electron-builder --linux --verbose
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: NEON-KJ-RaspberryPi5
          path: artifacts/electron/release/*.AppImage
          if-no-files-found: error
          retention-days: 90
